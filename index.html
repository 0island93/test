<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제주 페리 안내</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; color: #333; }
    h1 { color: #0066cc; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
    th { background: #0066cc; color: white; }
    tr:nth-child(even) { background: #f0f7ff; }
    footer { margin-top: 40px; font-size: 0.85em; color: #888; }
  </style>
</head>
<body>
  <h1>&#x26F4; 제주 페리 안내</h1>
  <p>제주도와 육지를 연결하는 주요 여객선 노선을 안내합니다.</p>

  <table>
    <thead>
      <tr>
        <th>출발지</th>
        <th>도착지</th>
        <th>소요 시간</th>
        <th>주요 선사</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>목포</td>
        <td>제주</td>
        <td>약 4시간 30분</td>
        <td>씨월드고속훼리</td>
      </tr>
      <tr>
        <td>완도</td>
        <td>제주</td>
        <td>약 2시간 30분</td>
        <td>한일고속</td>
      </tr>
      <tr>
        <td>녹동</td>
        <td>제주</td>
        <td>약 4시간</td>
        <td>남해고속</td>
      </tr>
      <tr>
        <td>부산</td>
        <td>제주</td>
        <td>약 12시간</td>
        <td>팬스타라인</td>
      </tr>
    </tbody>
  </table>

  <h2>이용 안내</h2>
  <ul>
    <li>출항 시간은 선사 및 날씨에 따라 변동될 수 있습니다.</li>
    <li>차량 선적 시 사전 예약을 권장합니다.</li>
    <li>기상 악화 시 결항될 수 있으니 출발 전 확인하세요.</li>
  </ul>

  <footer>※ 정확한 시간표와 요금은 각 선사 공식 홈페이지에서 확인하세요.</footer>
</body>
</html>
